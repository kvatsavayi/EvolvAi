name: Abacus Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .[dev]

      - name: Unit Tests
        run: pytest -q tests

      - name: Smoke Eval Pack
        run: python3 scripts/run_eval_pack.py smoke evals/smoke/workflow_smoke.json

      - name: Replay Eval Pack
        run: python3 scripts/run_eval_pack.py replay evals/replay_pack/replay_cases.json

      - name: Build Runtime Image
        run: docker build -f deployment/Dockerfile -t agent-pods-runtime .

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: test-and-eval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deployment Placeholder
        run: |
          echo "Add Abacus workflow deploy command here."
          echo "Expected inputs: runtime image, deploy config, workflow entrypoint."
