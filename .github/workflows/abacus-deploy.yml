name: Abacus Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .[dev]

      - name: Install Abacus SDK
        run: python3 -m pip install abacusai

      - name: Unit Tests
        run: pytest -q tests

      - name: Smoke Eval Pack
        run: python3 scripts/run_eval_pack.py smoke evals/smoke/workflow_smoke.json

      - name: Replay Eval Pack
        run: python3 scripts/run_eval_pack.py replay evals/replay_pack/replay_cases.json

      - name: Build Runtime Image
        run: docker build -f deployment/Dockerfile -t agent-pods-runtime .

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: test-and-eval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Runtime + Abacus SDK
        run: |
          pip install -e .[dev]
          python3 -m pip install abacusai

      - name: Deploy Workflow to Abacus
        env:
          ABACUS_API_KEY: ${{ secrets.ABACUS_API_KEY }}
          ABACUS_PROJECT_ID: ${{ secrets.ABACUS_PROJECT_ID }}
          ABACUS_MODEL_ID: ${{ secrets.ABACUS_MODEL_ID }}
          DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}
          INSTALL_SOURCE: ${{ secrets.INSTALL_SOURCE }}
          DEPLOYMENT_EXPOSURE: ${{ secrets.DEPLOYMENT_EXPOSURE }}
          MODEL_PROVIDER: ${{ secrets.MODEL_PROVIDER }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          MODEL_BASE_URL: ${{ secrets.MODEL_BASE_URL }}
        run: python3 src/update_agent.py
